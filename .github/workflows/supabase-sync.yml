name: 🔄 Auto Sync Supabase Schema to Lovable

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_TERMINAL_PROMPT: 0

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 

      - name: 🗄️ Cache Supabase CLI
        id: cache-supabase
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/supabase
          # 🛡️ تحديث مفتاح الخزنة ليتطابق مع الجيل الثاني
          key: ${{ runner.os }}-supabase-cli-2.23.4

      - name: 🛠️ Setup Supabase CLI
        if: steps.cache-supabase.outputs.cache-hit != 'true'
        uses: supabase/setup-cli@v1
        with:
          # 🛡️ ترقية السلاح إلى أحدث نسخة مستقرة مدعومة
          version: 2.23.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔗 Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CI: true

      - name: ⬇️ Pull Latest Schema
        run: |
          set +e
          OUTPUT=$(supabase db pull 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "No schema changes found"; then
              echo "✅ No schema changes detected. Proceeding gracefully."
              exit 0
            else
              echo "❌ Real connection error occurred."
              exit $EXIT_CODE
            fi
          fi
          set -e
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CI: true

      - name: Commit and Push to Lovable
        run: |
          git config --global user.name "QIRAA DevOps Bot"
          git config --global user.email "bot@qiraa.io"
          
          git add .
          
          if git diff --staged --quiet; then
            echo "✅ No files to commit. Repository is perfectly synced."
          else
            git commit -m "Auto-sync: Fetched latest database schema from Supabase"
            git pull origin main --rebase
            git push origin main
          fi
