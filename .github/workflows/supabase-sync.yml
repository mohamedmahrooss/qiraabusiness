name: 🔄 Auto Sync Supabase Schema to Lovable

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 

      - name: 🛠️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔗 Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CI: true

      - name: ⬇️ Pull Latest Schema (With Ghost-Error Handler)
        run: |
          set +e
          OUTPUT=$(supabase db pull 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          
          # 🛡️ هندسة اعتراض الأخطاء: تجاوز خطأ CLI إذا كان السبب هو تطابق البيانات
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "No schema changes found"; then
              echo "✅ No schema changes detected. Supabase CLI ghost-error intercepted. Proceeding gracefully."
              exit 0
            else
              echo "❌ Real connection error occurred."
              exit $EXIT_CODE
            fi
          fi
          set -e
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CI: true

      - name: Commit and Push to Lovable
        run: |
          git config --global user.name "QIRAA DevOps Bot"
          git config --global user.email "bot@qiraa.io"
          
          git pull origin main --rebase
          git add supabase/migrations/
          
          if git diff-index --quiet HEAD; then
            echo "No files to commit. Repository is perfectly synced."
          else
            git commit -m "Auto-sync: Fetched latest database schema from Supabase"
            git push origin main
          fi
