name: Auto Sync Supabase Schema to Lovable

on:
  schedule:
    # يعمل تلقائياً كل 10 دقائق
    - cron: '*/10 * * * *'
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  sync-schema:
    runs-on: ubuntu-latest
    # التحديث 1: إعلان الصلاحية السيادية للروبوت بالكتابة وتجاوز الرفض
    permissions:
      contents: write 
    
    # التحديث 2: إغلاق تحذير Node.js 20 الإجباري من GitHub
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CI: true # إجبار النظام على العمل بصمت بدون طلبات تفاعلية

      - name: Pull Latest Schema
        run: supabase db pull
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          CI: true

      - name: Commit and Push to Lovable
        run: |
          git config --global user.name "QIRAA DevOps Bot"
          git config --global user.email "bot@qiraa.io"
          
          # التحديث 3: حصر التتبع في خريطة الجداول فقط لمنع حلقات الرفع اللانهائية
          git add supabase/migrations/
          
          # التحديث 4: هيكل برمجي صلب يمنع خروج (Exit Code 1) عندما لا توجد تغييرات
          if ! git diff --staged --quiet; then
            git commit -m "Auto-sync: Fetched latest database schema from Supabase"
            git push
          else
            echo "No schema changes detected. Everything is up to date."
          fi
